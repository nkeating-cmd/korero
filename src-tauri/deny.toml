# Kōrero — cargo deny configuration.
#
# Complements cargo-audit (CVEs in Cargo.lock) with three additional gates:
#   * licenses: catch MIT/Apache-2.0 conformance, flag GPL/AGPL pulls
#   * bans:     deny known-bad deps or duplicate versions
#   * advisories: same source as cargo-audit but lets us tune severity
#   * sources:  whitelist git remotes so a typosquatted patch can't sneak in
#
# Run via `cargo-deny.bat` in the project root.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ----- advisories ---------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Korero (v1.18.0): only error on unmaintained DIRECT dependencies. The 22
# transitive unmaintained advisories (gtk3-rs bindings, atty, bincode, ...)
# come in via upstream Tauri/Handy and are not actionable from this fork.
# Vulnerability advisories still error regardless of depth (cargo audit is
# the second net for those).
unmaintained = "workspace"
ignore = [
    # Korero (v1.18.0): gtk / gtk-layer-shell are LINUX-ONLY direct deps
    # inherited from upstream Handy (this fork ships Windows NSIS only).
    # The gtk3-rs bindings are unmaintained but unused in shipped binaries.
    # Revisit only if a Linux build is ever produced.
    { id = "RUSTSEC-2024-0415", reason = "gtk: linux-only dep, not in Windows binary" },
    { id = "RUSTSEC-2024-0422", reason = "gtk-layer-shell: linux-only dep, not in Windows binary" },
]

# ----- licenses -----------------------------------------------------------
# Korero ships under MIT (matching upstream Handy). Allowed licenses must be
# MIT-compatible. ANYTHING in the deny list means "fail the build".
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
]
confidence-threshold = 0.8
# Per-crate exceptions go here. Document WHY for every entry.
exceptions = [
    # Korero (v1.18.0): whisper-rs/-sys are Unlicense (public domain
    # equivalent, MIT-compatible). Scoped per-crate rather than allowing
    # Unlicense globally.
    { allow = ["Unlicense"], crate = "whisper-rs" },
    { allow = ["Unlicense"], crate = "whisper-rs-sys" },
    # Korero (v1.18.0): Mozilla's CA bundle ships under CDLA-Permissive-2.0
    # (data licence, permissive, attribution-free). Pulled in by rustls.
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-root-certs" },
]
# Force-fail on anything copyleft-strong.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ----- bans ---------------------------------------------------------------
# Deny multiple-version of the same crate (catches the case where a transitive
# bump pulls in two copies of, say, openssl-sys). "warn" not "deny" because
# the Tauri ecosystem currently has unavoidable duplicates.
[bans]
multiple-versions = "warn"
# Korero (v1.18.0): "warn" not "deny" -- the 4 wildcard hits are korero's own
# [patch.crates-io] git entries (cjpais forks), which carry no version field
# by design; the git source + SHA pin (pin-deps.ps1) is the real control.
wildcards = "warn"
highlight = "all"
deny = [
    # Add specific deps to ban here, e.g. unmaintained or known-bad crates.
    # { crate = "openssl", reason = "use rustls instead" },
]
skip = []
skip-tree = []

# ----- sources ------------------------------------------------------------
# Whitelist the git remotes our [patch.crates-io] entries pull from. Any new
# git dep MUST come from a registered source; this defeats typosquatting and
# silent supplier swaps.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/cjpais/tauri",
    "https://github.com/cjpais/vad-rs",
    "https://github.com/cjpais/rodio",
    "https://github.com/rustdesk-org/rdev",
    "https://github.com/ahkohd/tauri-nspanel",
]
